<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — Then vs Now</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="logo-icon">🌸</span>
        <h1>Then vs Now</h1>
        <p>Begin your transformation today</p>
      </div>
      <h2>Create Account</h2>
      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>
      <form id="signupForm">
        <div class="form-group">
          <label for="name">Your Name</label>
          <input type="text" id="name" placeholder="e.g. Sarah" required />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="At least 6 characters" required minlength="6" />
        </div>
        <button type="submit" class="btn btn-primary" id="signupBtn">Create Account</button>
      </form>
      <div class="auth-link">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </div>
  <script src="js/app.js"></script>
  <script>
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('signupBtn');
      const errEl = document.getElementById('errorMsg');
      const sucEl = document.getElementById('successMsg');
      errEl.style.display = 'none';
      sucEl.style.display = 'none';
      btn.textContent = 'Creating account...';
      btn.disabled = true;

      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch(`${API_BASE}/auth/signup`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);
        localStorage.setItem('tvn_token', data.token);
        localStorage.setItem('tvn_user', JSON.stringify(data.user));
        sucEl.textContent = 'Account created! Redirecting...';
        sucEl.style.display = 'block';
        setTimeout(() => window.location.href = 'dashboard.html', 1000);
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
        btn.textContent = 'Create Account';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
