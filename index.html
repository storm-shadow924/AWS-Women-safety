<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Then vs Now — Your Transformation Journey</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .hero-page {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--lavender-light) 0%, var(--peach) 100%);
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 40px 20px;
    }
    .hero-content { max-width: 600px; animation: fadeUp 0.7s ease; }
    .hero-icon { font-size: 4rem; margin-bottom: 16px; }
    .hero-content h1 { font-size: 3rem; color: var(--lavender-dark); font-weight: 800; letter-spacing: -1px; }
    .hero-content .tagline { font-size: 1.15rem; color: var(--text-mid); margin: 16px 0 36px; line-height: 1.6; }
    .hero-btns { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    .hero-btns .btn { min-width: 160px; }
    .hero-features { display: flex; gap: 24px; justify-content: center; margin-top: 48px; flex-wrap: wrap; }
    .feature-pill {
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(10px);
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 0.88rem;
      color: var(--text-mid);
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="hero-page">
    <div class="hero-content">
      <div class="hero-icon">🌸</div>
      <h1>Then vs Now</h1>
      <p class="tagline">Your personal transformation platform. Track who you were, celebrate who you're becoming — across career, lifestyle, fitness, and mental health.</p>
      <div class="hero-btns">
        <a href="signup.html" class="btn btn-primary">Start Your Journey</a>
        <a href="login.html" class="btn btn-secondary">Sign In</a>
      </div>
      <div class="hero-features">
        <span class="feature-pill">💼 Career</span>
        <span class="feature-pill">✨ Lifestyle</span>
        <span class="feature-pill">💪 Fitness</span>
        <span class="feature-pill">🧠 Mental Health</span>
      </div>
    </div>
  </div>
</body>
</html>
